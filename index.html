<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hjemmedashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --accent: #58a6ff;
    --accent2: #f78166;
    --green: #3fb950;
    --yellow: #d29922;
    --text: #e6edf3;
    --muted: #7d8590;
    --border: #30363d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    touch-action: pan-x;
  }

  /* SWIPE CONTAINER */
  .slides-wrapper {
    display: flex;
    width: 300%;
    height: 100vh;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .slide {
    width: 33.333%;
    height: 100vh;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow: hidden;
  }

  /* DOT NAVIGATION */
  .dots {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 100;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active {
    background: var(--accent);
    transform: scale(1.4);
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0.6;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* CLOCK */
  .clock-time {
    font-family: 'Syne', sans-serif;
    font-size: clamp(56px, 14vw, 96px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }
  .clock-date {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* WEATHER */
  .weather-main {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .weather-icon {
    font-size: 52px;
    line-height: 1;
  }
  .weather-temp {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .weather-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .weather-details {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }
  .weather-detail span {
    color: var(--text);
    font-size: 13px;
    display: block;
  }

  /* DEPARTURES */
  .departure-row {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }
  .departure-row:last-child { border-bottom: none; }

  .line-badge {
    background: var(--accent2);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    border-radius: 8px;
    padding: 4px 6px;
    text-align: center;
    min-width: 40px;
  }
  .line-badge.green { background: var(--green); }
  .line-badge.blue { background: var(--accent); color: #0d1117; }
  .line-badge.yellow { background: var(--yellow); }

  .departure-dest {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .departure-dest small {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  .departure-time {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--green);
    white-space: nowrap;
    text-align: right;
  }
  .departure-time.soon { color: var(--accent2); }
  .departure-time.now { color: var(--yellow); }

  .loading-text {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 20px 0;
  }

  /* SLIDE 2 - FULL WEATHER */
  .forecast-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .forecast-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
    flex: 1;
    min-width: 55px;
  }
  .forecast-item .day { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
  .forecast-item .icon { font-size: 26px; margin: 4px 0; }
  .forecast-item .temp { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  .forecast-item .precip { font-size: 10px; color: var(--accent); margin-top: 3px; }

  /* SLIDE 3 - INFO */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .info-box {
    background: var(--surface2);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .info-box .val {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
  }
  .info-box .lbl {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Slide titles */
  .slide-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slide-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .error-text { color: var(--accent2); font-size: 11px; }

  /* Scrollable departures */
  .departures-scroll {
    overflow-y: auto;
    max-height: calc(100vh - 260px);
    scrollbar-width: none;
  }
  .departures-scroll::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="slides-wrapper" id="slidesWrapper">

  <!-- SLIDE 1: KLOKKE + AVGANGER -->
  <div class="slide">
    <div class="slide-title">Oversikt</div>

    <div class="card">
      <div id="clock-time" class="clock-time">--:--</div>
      <div id="clock-date" class="clock-date">Laster...</div>
    </div>

    <div class="card" style="flex:1; display:flex; flex-direction:column;">
      <div class="card-label">🚌 Strindheim Hageby</div>
      <div class="departures-scroll">
        <div id="departures-list"><div class="loading-text">Henter avganger...</div></div>
      </div>
    </div>
  </div>

  <!-- SLIDE 2: VÆR -->
  <div class="slide">
    <div class="slide-title">Vær — Trondheim 7045</div>

    <div class="card">
      <div class="card-label">Nå</div>
      <div class="weather-main">
        <div class="weather-icon" id="wx-icon">⏳</div>
        <div>
          <div class="weather-temp" id="wx-temp">--°</div>
          <div class="weather-desc" id="wx-desc">Laster vær...</div>
        </div>
      </div>
      <div class="weather-details">
        <div class="weather-detail"><span id="wx-wind">--</span>Vind m/s</div>
        <div class="weather-detail"><span id="wx-humidity">--</span>Fuktighet %</div>
        <div class="weather-detail"><span id="wx-precip">--</span>Nedbør mm</div>
        <div class="weather-detail"><span id="wx-feels">--</span>Føles som</div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Neste 5 dager</div>
      <div class="forecast-row" id="forecast-row">
        <div class="loading-text">Laster prognose...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">🚌 Neste avganger</div>
      <div id="departures-mini"><div class="loading-text">...</div></div>
    </div>
  </div>

  <!-- SLIDE 3: AVGANGER FULLSKJERM + STATUS -->
  <div class="slide">
    <div class="slide-title">Alle avganger</div>

    <div class="card" style="flex:1; display:flex; flex-direction:column;">
      <div class="card-label">🚌 Strindheim Hageby — alle linjer</div>
      <div class="departures-scroll">
        <div id="departures-full"><div class="loading-text">Henter avganger...</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Sist oppdatert</div>
      <div id="last-updated" style="font-size:11px; color: var(--muted);">—</div>
    </div>
  </div>

</div>

<!-- NAV DOTS -->
<div class="dots">
  <div class="dot active" id="dot0"></div>
  <div class="dot" id="dot1"></div>
  <div class="dot" id="dot2"></div>
</div>

<script>
// ─── SWIPE NAVIGATION ─────────────────────────────────────────────────────
let currentSlide = 0;
const totalSlides = 3;
const wrapper = document.getElementById('slidesWrapper');
let touchStartX = 0;
let touchStartY = 0;

function goToSlide(n) {
  currentSlide = Math.max(0, Math.min(totalSlides - 1, n));
  wrapper.style.transform = `translateX(-${currentSlide * 33.333}%)`;
  for (let i = 0; i < totalSlides; i++) {
    document.getElementById('dot' + i).classList.toggle('active', i === currentSlide);
  }
}

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    goToSlide(currentSlide + (dx < 0 ? 1 : -1));
  }
}, { passive: true });

// ─── KLOKKE ────────────────────────────────────────────────────────────────
const DAYS = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
const MONTHS = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${h}:${m}`;
  document.getElementById('clock-date').textContent =
    `${DAYS[now.getDay()]} ${now.getDate()}. ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

// ─── VÆR (Open-Meteo, gratis, ingen API-nøkkel) ────────────────────────────
// Koordinater for postnummer 7045 (Lade/Strindheim, Trondheim)
const LAT = 63.4305;
const LON = 10.4527;

function wxIcon(wmo) {
  if (wmo === 0) return '☀️';
  if (wmo <= 2) return '🌤️';
  if (wmo <= 3) return '☁️';
  if (wmo <= 49) return '🌫️';
  if (wmo <= 69) return '🌧️';
  if (wmo <= 79) return '🌨️';
  if (wmo <= 99) return '⛈️';
  return '🌡️';
}
function wxDesc(wmo) {
  if (wmo === 0) return 'Klarvær';
  if (wmo <= 2) return 'Delvis skyet';
  if (wmo <= 3) return 'Overskyet';
  if (wmo <= 49) return 'Tåke';
  if (wmo <= 59) return 'Yr';
  if (wmo <= 69) return 'Regn';
  if (wmo <= 79) return 'Snø';
  if (wmo <= 82) return 'Regnbyger';
  if (wmo <= 99) return 'Torden';
  return 'Ukjent';
}

async function fetchWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m,precipitation&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Europe%2FOslo&forecast_days=6`;
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;

    document.getElementById('wx-icon').textContent = wxIcon(c.weathercode);
    document.getElementById('wx-temp').textContent = Math.round(c.temperature_2m) + '°';
    document.getElementById('wx-desc').textContent = wxDesc(c.weathercode) + ' i Trondheim';
    document.getElementById('wx-wind').textContent = Math.round(c.windspeed_10m);
    document.getElementById('wx-humidity').textContent = c.relativehumidity_2m;
    document.getElementById('wx-precip').textContent = c.precipitation;
    document.getElementById('wx-feels').textContent = Math.round(c.apparent_temperature) + '°';

    // Prognose (skip dagens dato = index 0)
    const daily = data.daily;
    const forecastHTML = daily.date.slice(1, 6).map((dateStr, i) => {
      const idx = i + 1;
      const d = new Date(dateStr);
      const dayName = DAYS[d.getDay()].slice(0, 3);
      return `
        <div class="forecast-item">
          <div class="day">${dayName}</div>
          <div class="icon">${wxIcon(daily.weathercode[idx])}</div>
          <div class="temp">${Math.round(daily.temperature_2m_max[idx])}°</div>
          <div class="precip">${daily.precipitation_sum[idx]}mm</div>
        </div>`;
    }).join('');
    document.getElementById('forecast-row').innerHTML = forecastHTML;
  } catch(e) {
    document.getElementById('wx-desc').textContent = 'Kunne ikke laste vær';
  }
}

// ─── AVGANGER (Entur JourneyPlanner API) ───────────────────────────────────
// Strindheim Hageby, Trondheim – NSR:Quay ID
// Vi bruker stopPlace søk via Entur sitt åpne API
const STOP_ID = 'NSR:StopPlace:42799'; // Strindheim Hageby

async function fetchDepartures() {
  const query = `
  {
    stopPlace(id: "${STOP_ID}") {
      name
      estimatedCalls(timeRange: 72000, numberOfDepartures: 12) {
        realtime
        aimedDepartureTime
        expectedDepartureTime
        destinationDisplay { frontText }
        serviceJourney {
          journeyPattern {
            line { publicCode transportMode }
          }
        }
      }
    }
  }`;

  try {
    const res = await fetch('https://api.entur.io/journey-planner/v3/graphql', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ET-Client-Name': 'hjemmedashboard-privat'
      },
      body: JSON.stringify({ query })
    });
    const data = await res.json();
    const calls = data?.data?.stopPlace?.estimatedCalls;
    if (!calls || calls.length === 0) throw new Error('Ingen avganger');

    const now = new Date();
    const rows = calls.map(call => {
      const exp = new Date(call.expectedDepartureTime);
      const diffMin = Math.round((exp - now) / 60000);
      const line = call.serviceJourney?.journeyPattern?.line;
      const lineCode = line?.publicCode || '?';
      const dest = call.destinationDisplay?.frontText || '—';
      const mode = line?.transportMode || 'bus';

      let timeLabel, timeClass;
      if (diffMin <= 0) { timeLabel = 'Nå'; timeClass = 'now'; }
      else if (diffMin <= 2) { timeLabel = diffMin + ' min'; timeClass = 'soon'; }
      else if (diffMin < 60) { timeLabel = diffMin + ' min'; timeClass = ''; }
      else {
        const h = String(exp.getHours()).padStart(2,'0');
        const m = String(exp.getMinutes()).padStart(2,'0');
        timeLabel = h + ':' + m; timeClass = '';
      }

      // Badge color based on line number
      const lnum = parseInt(lineCode);
      let badgeClass = '';
      if (lnum >= 1 && lnum <= 9) badgeClass = 'green';
      else if (lnum >= 10 && lnum <= 19) badgeClass = 'blue';
      else if (lnum >= 20 && lnum <= 29) badgeClass = 'yellow';

      return `
        <div class="departure-row">
          <div class="line-badge ${badgeClass}">${lineCode}</div>
          <div class="departure-dest">${dest}<small>${call.realtime ? '● Sanntid' : '○ Rutetid'}</small></div>
          <div class="departure-time ${timeClass}">${timeLabel}</div>
        </div>`;
    }).join('');

    document.getElementById('departures-list').innerHTML = rows;
    document.getElementById('departures-full').innerHTML = rows;

    // Mini på slide 2 (bare første 4)
    const miniRows = calls.slice(0, 4).map(call => {
      const exp = new Date(call.expectedDepartureTime);
      const diffMin = Math.round((exp - now) / 60000);
      const lineCode = call.serviceJourney?.journeyPattern?.line?.publicCode || '?';
      const dest = call.destinationDisplay?.frontText || '—';
      const lnum = parseInt(lineCode);
      let badgeClass = '';
      if (lnum >= 1 && lnum <= 9) badgeClass = 'green';
      else if (lnum >= 10 && lnum <= 19) badgeClass = 'blue';
      else if (lnum >= 20 && lnum <= 29) badgeClass = 'yellow';
      const timeLabel = diffMin <= 0 ? 'Nå' : diffMin < 60 ? diffMin + ' min' : String(exp.getHours()).padStart(2,'0') + ':' + String(exp.getMinutes()).padStart(2,'0');
      const timeClass = diffMin <= 0 ? 'now' : diffMin <= 2 ? 'soon' : '';
      return `<div class="departure-row">
        <div class="line-badge ${badgeClass}">${lineCode}</div>
        <div class="departure-dest">${dest}</div>
        <div class="departure-time ${timeClass}">${timeLabel}</div>
      </div>`;
    }).join('');
    document.getElementById('departures-mini').innerHTML = miniRows;

    const ts = new Date();
    document.getElementById('last-updated').textContent =
      `Avganger: ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}:${String(ts.getSeconds()).padStart(2,'0')}`;

  } catch(e) {
    const errMsg = `<div class="loading-text error-text">Feil: ${e.message}<br><small>Sjekk internett-tilkobling</small></div>`;
    document.getElementById('departures-list').innerHTML = errMsg;
    document.getElementById('departures-full').innerHTML = errMsg;
  }
}

// ─── INIT & REFRESH ────────────────────────────────────────────────────────
fetchWeather();
fetchDepartures();

// Oppdater avganger hvert 30. sekund
setInterval(fetchDepartures, 30000);
// Oppdater vær hvert 10. minutt
setInterval(fetchWeather, 10 * 60 * 1000);
</script>
</body>
</html>
