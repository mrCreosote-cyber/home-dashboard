<!DOCTYPE html>
<html lang="no" data-theme="sand">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hjemmedashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════════
   TEMA: SAND  — Varm, organisk, 2026-editorial
   Inspirert av: desert modernism, linen, paper
   Font: Instrument Serif + Geist Mono
═══════════════════════════════════════════════ */
[data-theme="sand"] {
  --bg:        #f0ebe3;
  --bg2:       #e8e1d7;
  --surface:   #ede8e0;
  --surface2:  #e2dcd2;
  --border:    #cfc8bc;
  --text:      #2a2420;
  --muted:     #8a7f74;
  --accent:    #b5541c;   /* terrakotta */
  --accent2:   #4a7c6a;   /* sage grønn */
  --subtle:    #d4c5b2;
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-mono:    'Geist Mono', monospace;
  --clock-size: clamp(64px, 15vw, 104px);
  --radius: 4px;
  --shadow: 0 1px 3px rgba(42,36,32,0.08);
}

/* ═══════════════════════════════════════════════
   TEMA: SLATE — Kjølig, moderne, arkitektonisk
   Inspirert av: Scandinavian brutalism, cement
   Font: Cormorant Garamond + Geist Mono
═══════════════════════════════════════════════ */
[data-theme="slate"] {
  --bg:        #1a1c1e;
  --bg2:       #141618;
  --surface:   #212427;
  --surface2:  #292d31;
  --border:    #383d42;
  --text:      #dde2e8;
  --muted:     #727c87;
  --accent:    #c9a96e;   /* muted gold */
  --accent2:   #7aab98;   /* dusty teal */
  --subtle:    #2e3338;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-mono:    'Geist Mono', monospace;
  --clock-size: clamp(64px, 15vw, 104px);
  --radius: 2px;
  --shadow: 0 1px 4px rgba(0,0,0,0.3);
}

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%; overflow:hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 14px;
  transition: background .4s, color .4s;
  touch-action: pan-x;
}

/* Subtle grain texture overlay */
body::after {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:999;
  opacity:.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 128px;
}

/* ═══════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════ */
#setup-screen {
  position:fixed; inset:0; background:var(--bg); z-index:200;
  display:flex; align-items:center; justify-content:center; padding:28px;
  transition: background .4s;
}
.setup-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius: calc(var(--radius) * 3);
  padding:36px 32px; width:100%; max-width:460px;
  box-shadow: var(--shadow);
}
.setup-box h1 {
  font-family: var(--font-display);
  font-size:26px; font-weight:400;
  letter-spacing:-.01em;
  margin-bottom:8px;
}
.setup-box p {
  font-size:11px; color:var(--muted); margin-bottom:32px;
  line-height:1.7; letter-spacing:.02em;
}
.setup-label {
  font-size:9px; letter-spacing:.2em; text-transform:uppercase;
  color:var(--muted); margin-bottom:8px; display:block;
}
.setup-input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-family:var(--font-mono); font-size:13px;
  padding:12px 14px; outline:none; transition:border-color .2s;
}
.setup-input:focus { border-color:var(--accent); }
.setup-section { margin-bottom:24px; }
.stop-result-item {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); padding:10px 14px; margin-top:6px;
  cursor:pointer; font-size:12px; transition:border-color .2s, background .2s;
}
.stop-result-item:hover { border-color:var(--accent); }
.stop-result-item small { display:block; font-size:10px; color:var(--muted); margin-top:2px; }
.stop-searching { font-size:11px; color:var(--muted); padding:8px 0; }
.selected-badge {
  background:var(--surface2); border:1px solid var(--accent2);
  border-radius:var(--radius); padding:10px 14px; font-size:12px;
  margin-top:8px; display:none; color:var(--accent2);
}
.selected-badge small { display:block; font-size:10px; color:var(--muted); margin-top:2px; }
.setup-btn {
  width:100%; background:var(--accent); color:#fff; border:none;
  border-radius:var(--radius); font-family:var(--font-mono);
  font-size:12px; letter-spacing:.1em; text-transform:uppercase;
  padding:14px; cursor:pointer; margin-top:8px; transition:opacity .2s;
}
.setup-btn:disabled { opacity:.35; cursor:not-allowed; }

/* Theme toggle inside setup */
.theme-toggle-row {
  display:flex; gap:10px; margin-bottom:28px;
}
.theme-btn {
  flex:1; padding:10px; border:1px solid var(--border); border-radius:var(--radius);
  background:var(--surface2); cursor:pointer; font-family:var(--font-mono);
  font-size:11px; color:var(--muted); transition:all .2s; text-align:center;
}
.theme-btn.active { border-color:var(--accent); color:var(--accent); background:var(--bg); }
.theme-btn span { display:block; font-size:16px; margin-bottom:4px; }

/* ═══════════════════════════════════════════════
   COG BUTTON
═══════════════════════════════════════════════ */
#cog-btn {
  position:fixed; top:16px; right:16px; z-index:150;
  background:var(--surface); border:1px solid var(--border);
  border-radius:50%; width:34px; height:34px;
  display:none; align-items:center; justify-content:center;
  cursor:pointer; font-size:14px; opacity:.4;
  transition:opacity .2s, background .4s, border-color .4s;
  box-shadow: var(--shadow);
}
#cog-btn:hover { opacity:1; }

/* ═══════════════════════════════════════════════
   SLIDES
═══════════════════════════════════════════════ */
.slides-wrapper {
  display:flex; width:300%; height:100vh;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.slide {
  width:33.333%; height:100vh;
  padding:28px 22px 52px;
  display:flex; flex-direction:column; gap:16px; overflow:hidden;
}

/* ═══════════════════════════════════════════════
   DOTS
═══════════════════════════════════════════════ */
.dots {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  display:flex; gap:8px; z-index:100;
}
.dot {
  width:20px; height:2px; border-radius:2px;
  background:var(--subtle); transition:background .3s, width .3s;
}
.dot.active { background:var(--accent); width:32px; }

/* ═══════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════ */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:calc(var(--radius)*2); padding:20px 22px;
  box-shadow:var(--shadow); position:relative; overflow:hidden;
  transition:background .4s, border-color .4s;
}
.card-label {
  font-size:9px; letter-spacing:.2em; text-transform:uppercase;
  color:var(--muted); margin-bottom:12px;
}
.card-divider {
  height:1px; background:var(--border); margin:14px 0;
}

/* ═══════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════ */
.clock-time {
  font-family: var(--font-display);
  font-size: var(--clock-size);
  font-weight: 300;
  letter-spacing:-.04em;
  line-height: 1;
  color: var(--text);
}
[data-theme="sand"] .clock-time { font-style: italic; }
[data-theme="slate"] .clock-time { font-weight: 300; }

.clock-date {
  font-size:11px; color:var(--muted);
  margin-top:8px; letter-spacing:.08em;
  text-transform:uppercase;
}

/* ═══════════════════════════════════════════════
   WEATHER
═══════════════════════════════════════════════ */
.weather-main { display:flex; align-items:flex-start; gap:16px; }
.weather-icon { font-size:44px; line-height:1; margin-top:4px; }
.weather-temp {
  font-family:var(--font-display); font-size:52px; font-weight:300;
  letter-spacing:-.03em; line-height:1; color:var(--text);
}
.weather-desc { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:.05em; }
.weather-details {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px 20px; margin-top:16px;
}
.weather-detail { font-size:10px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
.weather-detail span { color:var(--text); font-size:15px; display:block; margin-bottom:2px; font-family:var(--font-display); font-weight:400; }

/* ═══════════════════════════════════════════════
   FORECAST
═══════════════════════════════════════════════ */
.forecast-row { display:flex; gap:6px; }
.forecast-item {
  background:var(--surface2); border-radius:var(--radius);
  padding:10px 8px; text-align:center; flex:1; min-width:0;
  transition:background .4s;
}
.forecast-item .day { font-size:9px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.12em; }
.forecast-item .icon { font-size:22px; margin:4px 0; }
.forecast-item .temp { font-family:var(--font-display); font-size:14px; color:var(--text); }
.forecast-item .precip { font-size:9px; color:var(--accent2); margin-top:3px; }

/* ═══════════════════════════════════════════════
   DEPARTURES
═══════════════════════════════════════════════ */
.departure-row {
  display:grid; grid-template-columns:38px 1fr auto;
  align-items:center; gap:12px;
  padding:10px 0; border-bottom:1px solid var(--border);
}
.departure-row:last-child { border-bottom:none; }

.line-badge {
  border:1px solid var(--border); color:var(--accent);
  font-family:var(--font-mono); font-size:11px; font-weight:500;
  border-radius:var(--radius); padding:3px 5px;
  text-align:center; min-width:34px; letter-spacing:.04em;
}
.line-badge.alt { color:var(--accent2); border-color:var(--accent2); }

.departure-dest { font-size:12px; letter-spacing:.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.departure-dest small { display:block; font-size:9px; color:var(--muted); margin-top:2px; letter-spacing:.05em; }

.departure-time {
  font-family:var(--font-display); font-size:18px; font-weight:400;
  color:var(--text); white-space:nowrap; text-align:right;
}
.departure-time.soon { color:var(--accent); }
.departure-time.now  { color:var(--accent2); font-style:italic; }

.loading-text { color:var(--muted); font-size:11px; text-align:center; padding:20px 0; letter-spacing:.06em; }
.error-text { color:var(--accent); }

.departures-scroll { overflow-y:auto; flex:1; scrollbar-width:none; }
.departures-scroll::-webkit-scrollbar { display:none; }

/* ═══════════════════════════════════════════════
   SLIDE TITLE
═══════════════════════════════════════════════ */
.slide-title {
  font-size:9px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--muted); display:flex; align-items:center; gap:10px;
}
.slide-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ═══════════════════════════════════════════════
   SLIDE-IN ANIMATION
═══════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.slide .card {
  animation: fadeUp .5s ease both;
}
.slide .card:nth-child(2) { animation-delay:.08s; }
.slide .card:nth-child(3) { animation-delay:.16s; }
.slide .card:nth-child(4) { animation-delay:.24s; }
</style>
</head>
<body>

<!-- ══ SETUP SCREEN ════════════════════════════════════════════════ -->
<div id="setup-screen">
  <div class="setup-box">
    <h1>Hjemmedashboard</h1>
    <p>Søk opp holdeplass og skriv inn postnummer. Innstillingene lagres på denne enheten.</p>

    <div class="setup-section">
      <label class="setup-label">Tema</label>
      <div class="theme-toggle-row">
        <button class="theme-btn active" id="theme-sand" onclick="setTheme('sand')">
          <span>🌿</span>Sand
        </button>
        <button class="theme-btn" id="theme-slate" onclick="setTheme('slate')">
          <span>🪨</span>Slate
        </button>
      </div>
    </div>

    <div class="setup-section">
      <label class="setup-label">Holdeplass</label>
      <input class="setup-input" id="stop-search" type="text" placeholder="Søk etter holdeplass…" autocomplete="off">
      <div id="stop-results"></div>
      <div class="selected-badge" id="selected-badge"></div>
    </div>

    <div class="setup-section">
      <label class="setup-label">Postnummer</label>
      <input class="setup-input" id="postal-input" type="text" inputmode="numeric" maxlength="4" placeholder="F.eks. 3210">
    </div>

    <button class="setup-btn" id="save-btn" disabled>Lagre og start</button>
  </div>
</div>

<!-- ══ COG ═══════════════════════════════════════════════════════ -->
<div id="cog-btn">⚙️</div>

<!-- ══ DASHBOARD ══════════════════════════════════════════════════ -->
<div class="slides-wrapper" id="slidesWrapper">

  <!-- SIDE 1: KLOKKE + AVGANGER -->
  <div class="slide">
    <div class="slide-title">Oversikt</div>
    <div class="card">
      <div id="clock-time" class="clock-time">--:--</div>
      <div id="clock-date" class="clock-date"></div>
    </div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;">
      <div class="card-label" id="lbl1">Avganger</div>
      <div class="departures-scroll">
        <div id="dep1"><div class="loading-text">Henter avganger…</div></div>
      </div>
    </div>
  </div>

  <!-- SIDE 2: VÆR -->
  <div class="slide">
    <div class="slide-title">Vær</div>
    <div class="card">
      <div class="card-label" id="wx-lbl">Nå</div>
      <div class="weather-main">
        <div class="weather-icon" id="wx-icon">—</div>
        <div>
          <div class="weather-temp" id="wx-temp">--°</div>
          <div class="weather-desc" id="wx-desc">Laster…</div>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="weather-details">
        <div class="weather-detail"><span id="wx-wind">--</span>Vind m/s</div>
        <div class="weather-detail"><span id="wx-humidity">--</span>Fuktighet %</div>
        <div class="weather-detail"><span id="wx-precip">--</span>Nedbør mm</div>
        <div class="weather-detail"><span id="wx-feels">--</span>Føles som</div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">5-dagersprognose</div>
      <div class="forecast-row" id="forecast"><div class="loading-text">…</div></div>
    </div>
    <div class="card">
      <div class="card-label" id="lbl2">Avganger</div>
      <div id="dep2"><div class="loading-text">…</div></div>
    </div>
  </div>

  <!-- SIDE 3: ALLE AVGANGER -->
  <div class="slide">
    <div class="slide-title">Avganger</div>
    <div class="card" style="flex:1;display:flex;flex-direction:column;">
      <div class="card-label" id="lbl3">Alle avganger</div>
      <div class="departures-scroll">
        <div id="dep3"><div class="loading-text">Henter…</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Oppdatert</div>
      <div id="last-updated" style="font-size:11px;color:var(--muted)">—</div>
    </div>
  </div>

</div>

<!-- DOTS -->
<div class="dots">
  <div class="dot active" id="dot0"></div>
  <div class="dot" id="dot1"></div>
  <div class="dot" id="dot2"></div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────
const DAYS   = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
const MONTHS = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
let config = null;
let selectedStop = null;
let currentTheme = 'sand';

// ── THEME ────────────────────────────────────────────────────────
function setTheme(t) {
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-sand').classList.toggle('active', t === 'sand');
  document.getElementById('theme-slate').classList.toggle('active', t === 'slate');
  if (config) { config.theme = t; localStorage.setItem('dashboardConfig', JSON.stringify(config)); }
}

// ── SETUP ────────────────────────────────────────────────────────
const stopSearchEl   = document.getElementById('stop-search');
const stopResultsEl  = document.getElementById('stop-results');
const selectedBadge  = document.getElementById('selected-badge');
const postalEl       = document.getElementById('postal-input');
const saveBtn        = document.getElementById('save-btn');

function checkReady() { saveBtn.disabled = !(selectedStop && postalEl.value.length === 4); }

let searchTimer = null;
stopSearchEl.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = stopSearchEl.value.trim();
  if (q.length < 2) { stopResultsEl.innerHTML = ''; return; }
  stopResultsEl.innerHTML = '<div class="stop-searching">Søker…</div>';
  searchTimer = setTimeout(() => searchStops(q), 400);
});

async function searchStops(q) {
  try {
    const r = await fetch(`https://api.entur.io/geocoder/v1/autocomplete?text=${encodeURIComponent(q)}&lang=no&size=6&layers=venue`,
      { headers: { 'ET-Client-Name': 'hjemmedashboard-privat' } });
    const data = await r.json();
    const stops = (data.features || []).filter(f =>
      f.properties.category?.some(c => ['onstreetBus','busStation','stopPlace','railStation'].some(t => c.includes(t)))
    );
    if (!stops.length) { stopResultsEl.innerHTML = '<div class="stop-searching">Ingen treff.</div>'; return; }
    stopResultsEl.innerHTML = stops.map(f => {
      const p = f.properties;
      return `<div class="stop-result-item" data-id="${p.id}" data-name="${p.name}" data-lon="${f.geometry.coordinates[0]}" data-lat="${f.geometry.coordinates[1]}">
        ${p.name}<small>${p.county || p.region || ''}</small></div>`;
    }).join('');
    stopResultsEl.querySelectorAll('.stop-result-item').forEach(el => {
      el.addEventListener('click', () => {
        selectedStop = { id: el.dataset.id, name: el.dataset.name, lat: parseFloat(el.dataset.lat), lon: parseFloat(el.dataset.lon) };
        stopResultsEl.innerHTML = '';
        stopSearchEl.value = '';
        selectedBadge.style.display = 'block';
        selectedBadge.innerHTML = `✓ ${selectedStop.name}<small>${selectedStop.id}</small>`;
        checkReady();
      });
    });
  } catch(e) { stopResultsEl.innerHTML = '<div class="stop-searching error-text">Søkefeil.</div>'; }
}

postalEl.addEventListener('input', checkReady);

saveBtn.addEventListener('click', async () => {
  saveBtn.textContent = 'Lagrer…'; saveBtn.disabled = true;
  let lat = selectedStop.lat, lon = selectedStop.lon;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?postalcode=${postalEl.value}&country=NO&format=json&limit=1`);
    const d = await r.json();
    if (d.length) { lat = parseFloat(d[0].lat); lon = parseFloat(d[0].lon); }
  } catch(e) {}
  config = { stopId: selectedStop.id, stopName: selectedStop.name, postalCode: postalEl.value, lat, lon, theme: currentTheme };
  localStorage.setItem('dashboardConfig', JSON.stringify(config));
  startDashboard();
});

document.getElementById('cog-btn').addEventListener('click', () => {
  if (config) {
    selectedStop = { id: config.stopId, name: config.stopName, lat: config.lat, lon: config.lon };
    selectedBadge.style.display = 'block';
    selectedBadge.innerHTML = `✓ ${config.stopName}<small>${config.stopId}</small>`;
    postalEl.value = config.postalCode;
    setTheme(config.theme || 'sand');
    checkReady();
  }
  document.getElementById('setup-screen').style.display = 'flex';
});

// ── START ────────────────────────────────────────────────────────
function startDashboard() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('cog-btn').style.display = 'flex';
  setTheme(config.theme || 'sand');
  const n = config.stopName.length > 26 ? config.stopName.slice(0,26) + '…' : config.stopName;
  ['lbl1','lbl2','lbl3'].forEach(id => document.getElementById(id).textContent = n);
  document.getElementById('wx-lbl').textContent = 'Nå — ' + config.postalCode;
  initClock(); fetchWeather(); fetchDepartures();
  setInterval(fetchDepartures, 30000);
  setInterval(fetchWeather, 600000);
}

// ── CLOCK ────────────────────────────────────────────────────────
function initClock() {
  function tick() {
    const d = new Date();
    document.getElementById('clock-time').textContent =
      String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    document.getElementById('clock-date').textContent =
      DAYS[d.getDay()] + ' ' + d.getDate() + '. ' + MONTHS[d.getMonth()];
  }
  setInterval(tick, 1000); tick();
}

// ── WEATHER ──────────────────────────────────────────────────────
function wxIcon(c) { return c===0?'☀️':c<=2?'🌤️':c<=3?'☁️':c<=49?'🌫️':c<=69?'🌧️':c<=79?'🌨️':'⛈️'; }
function wxDesc(c) { return c===0?'Klarvær':c<=2?'Delvis skyet':c<=3?'Overskyet':c<=49?'Tåke':c<=59?'Yr':c<=69?'Regn':c<=79?'Snø':c<=82?'Byger':'Torden'; }

async function fetchWeather() {
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${config.lat}&longitude=${config.lon}&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relativehumidity_2m,precipitation&daily=weathercode,temperature_2m_max,precipitation_sum&timezone=Europe%2FOslo&forecast_days=6`);
    const data = await r.json(); const c = data.current;
    document.getElementById('wx-icon').textContent = wxIcon(c.weathercode);
    document.getElementById('wx-temp').textContent = Math.round(c.temperature_2m) + '°';
    document.getElementById('wx-desc').textContent = wxDesc(c.weathercode);
    document.getElementById('wx-wind').textContent = Math.round(c.windspeed_10m);
    document.getElementById('wx-humidity').textContent = c.relativehumidity_2m;
    document.getElementById('wx-precip').textContent = c.precipitation;
    document.getElementById('wx-feels').textContent = Math.round(c.apparent_temperature) + '°';
    const dd = data.daily;
    document.getElementById('forecast').innerHTML = dd.date.slice(1,6).map((ds,i) => {
      const idx=i+1, d=new Date(ds);
      return `<div class="forecast-item"><div class="day">${DAYS[d.getDay()].slice(0,3)}</div><div class="icon">${wxIcon(dd.weathercode[idx])}</div><div class="temp">${Math.round(dd.temperature_2m_max[idx])}°</div><div class="precip">${dd.precipitation_sum[idx]}mm</div></div>`;
    }).join('');
  } catch(e) { document.getElementById('wx-desc').textContent = 'Feil ved lasting'; }
}

// ── DEPARTURES ───────────────────────────────────────────────────
function tLabel(exp, now) {
  const d = Math.round((exp - now) / 60000);
  if (d <= 0) return ['Nå', 'now'];
  if (d <= 2)  return [d + ' min', 'soon'];
  if (d < 60)  return [d + ' min', ''];
  return [String(exp.getHours()).padStart(2,'0') + ':' + String(exp.getMinutes()).padStart(2,'0'), ''];
}

async function fetchDepartures() {
  const q = `{ stopPlace(id:"${config.stopId}") { estimatedCalls(timeRange:72000,numberOfDepartures:14) { realtime expectedDepartureTime destinationDisplay{frontText} serviceJourney{journeyPattern{line{publicCode}}} } } }`;
  try {
    const r = await fetch('https://api.entur.io/journey-planner/v3/graphql', {
      method:'POST',
      headers:{'Content-Type':'application/json','ET-Client-Name':'hjemmedashboard-privat'},
      body:JSON.stringify({query:q})
    });
    const data = await r.json();
    const calls = data?.data?.stopPlace?.estimatedCalls;
    if (!calls?.length) throw new Error('Ingen avganger');
    const now = new Date();
    const row = (call, mini) => {
      const exp = new Date(call.expectedDepartureTime);
      const lc = call.serviceJourney?.journeyPattern?.line?.publicCode || '?';
      const dest = call.destinationDisplay?.frontText || '—';
      const [tl, tc] = tLabel(exp, now);
      const alt = parseInt(lc) % 2 === 0 ? 'alt' : '';
      return `<div class="departure-row">
        <div class="line-badge ${alt}">${lc}</div>
        <div class="departure-dest">${dest}${mini?'':'<small>'+(call.realtime?'sanntid':'rutetid')+'</small>'}</div>
        <div class="departure-time ${tc}">${tl}</div>
      </div>`;
    };
    const full = calls.map(c => row(c, false)).join('');
    document.getElementById('dep1').innerHTML = full;
    document.getElementById('dep3').innerHTML = full;
    document.getElementById('dep2').innerHTML = calls.slice(0,4).map(c => row(c, true)).join('');
    const ts = new Date();
    document.getElementById('last-updated').textContent =
      String(ts.getHours()).padStart(2,'0')+':'+String(ts.getMinutes()).padStart(2,'0')+':'+String(ts.getSeconds()).padStart(2,'0');
  } catch(e) {
    const err = `<div class="loading-text error-text">${e.message}</div>`;
    ['dep1','dep3'].forEach(id => document.getElementById(id).innerHTML = err);
  }
}

// ── SWIPE ────────────────────────────────────────────────────────
let slide = 0, tx = 0, ty = 0;
const wrapper = document.getElementById('slidesWrapper');
function goTo(n) {
  slide = Math.max(0, Math.min(2, n));
  wrapper.style.transform = `translateX(-${slide * 33.333}%)`;
  for (let i = 0; i < 3; i++) document.getElementById('dot'+i).classList.toggle('active', i === slide);
}
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive:true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) goTo(slide + (dx < 0 ? 1 : -1));
}, { passive:true });

// ── INIT ─────────────────────────────────────────────────────────
try {
  const saved = localStorage.getItem('dashboardConfig');
  if (saved) { config = JSON.parse(saved); startDashboard(); }
} catch(e) {}
</script>
